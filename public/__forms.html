<!doctype html>
<html>
  <head><title>Netlify Forms Detection</title></head>
  <body>
    <form name="quote" data-netlify="true" data-netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="quote" />
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="service" />
      <input type="text" name="service_other" />
      <input type="text" name="project_type" />
      <input type="text" name="project_type_other" />
      <input type="text" name="project_stage" />
      <input type="text" name="project_stage_other" />
      <input type="text" name="area" />
      <input type="text" name="location" />
      <input type="text" name="timeline" />
      <input type="text" name="timeline_other" />
      <input type="text" name="budget" />
      <input type="text" name="budget_other" />
      <input type="text" name="contact_method" />
      <input type="text" name="contact_method_other" />
      <input type="text" name="referral_source" />
      <input type="text" name="referral_source_other" />
      <input type="text" name="site_visit" />
      <textarea name="description"></textarea>
      <input type="file" name="attachment" />
    </form>
  </body>
</html>
